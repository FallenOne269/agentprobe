name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── 1. Run the full test suite first ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=agentprobe --cov-report=term-missing

  # ── 2. Build & publish to PyPI via OIDC trusted publishing ───────────────
  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC / trusted publishing
      contents: write   # required to create GitHub Release

    environment: pypi   # configure trusted publishing in this env on PyPI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
